<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>TMK Agency Login</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins',sans-serif;
}

body{
height:100vh;
display:flex;
justify-content:center;
align-items:center;
background:linear-gradient(135deg,#0a0a0a,#1a1a1a);
color:white;
}

.container{
background:#111;
padding:40px;
border-radius:12px;
width:360px;
box-shadow:0 0 40px rgba(255,255,255,0.05);
animation:fade 0.6s ease;
}

@keyframes fade{
from{opacity:0;transform:translateY(10px)}
to{opacity:1}
}

.logo{
text-align:center;
font-size:22px;
font-weight:600;
margin-bottom:25px;
}

.password-container {
  position: relative;
  width: 280px;
}

.password-container input {
  width: 100%;
  padding: 12px 40px 12px 12px;
  border-radius: 10px;
  border: 1px solid #ccc;
  outline: none;
  font-size: 14px;
  transition: 0.3s;
}

.password-container input:focus {
  border-color: #6c63ff;
  box-shadow: 0 0 5px rgba(108, 99, 255, 0.4);
}

.toggle-password {
  position: absolute;
  right: 12px;
  top: 50%;
  transform: translateY(-50%);
  cursor: pointer;
  color: #888;
  font-size: 16px;
  transition: 0.3s;
}

.toggle-password:hover {
  color: #6c63ff;
}

input{
width:100%;
padding:12px;
margin-bottom:15px;
border:none;
border-radius:6px;
background:#1c1c1c;
color:white;
outline:none;
transition:0.3s;
}

input:focus{
box-shadow:0 0 0 2px white;
}

button{
width:100%;
padding:12px;
border:none;
border-radius:6px;
background:white;
color:black;
font-weight:600;
cursor:pointer;
transition:0.3s;
}

button:hover{
background:#eaeaea;
}

.links{
margin-top:15px;
display:flex;
justify-content:space-between;
font-size:13px;
}

.links a{
color:#ccc;
text-decoration:none;
cursor:pointer;
}

.links a:hover{
color:white;
}

</style>
</head>

<body>

<div class="container">

<div class="logo">TMK Agency</div>

<input type="email" id="email" placeholder="Correo corporativo">

<div class="password-container">
  <input type="password" id="password" placeholder="Contraseña">
  <i class="fa-solid fa-eye toggle-password" onclick="togglePassword()"></i>
</div>

<button type="button" onclick="login()">Iniciar sesión</button>

<div class="links">
<a onclick="forgot()">Olvidé contraseña</a>
<a href="register.html">Crear contraseña</a>
</div>

</div>

<script>

  const API = "https://jean-paul.onrender.com";
  
  async function login() {
  
    console.log("🔥 CLICK LOGIN");
  
    const emailInput = document.getElementById("email");
    const passwordInput = document.getElementById("password");
  
    if (!emailInput || !passwordInput) {
      console.error("❌ Inputs no encontrados en el DOM");
      alert("Error interno: inputs no detectados");
      return;
    }
  
    const email = emailInput.value.trim();
    const password = passwordInput.value.trim();
  
    console.log("📧 Email:", email);
    console.log("🔑 Password:", password);
  
    if (!email || !password) {
      alert("Por favor completa todos los campos");
      return;
    }
  
    try {
  
      const res = await fetch(`${API}/login`, {
        method: "POST",
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ email, password })
      });
  
      console.log("📡 Status:", res.status);
  
      if (!res.ok) {
        throw new Error("Error en el servidor");
      }
  
      const data = await res.json();
  
      console.log("📦 Response:", data);
  
      if (data.success) {
  
        localStorage.setItem("email", email);
  
        console.log("✅ Login exitoso, redirigiendo...");
        window.location.href = "index.html";
  
      } else {
        alert(data.message || "Credenciales incorrectas");
      }
  
    } catch (error) {
      console.error("❌ ERROR:", error);
      alert("No se pudo conectar con el servidor");
    }
  }
  
  function forgot() {
    window.location.href = "forgot.html";
  }
  
  function togglePassword() {
    const input = document.getElementById("password");
    const icon = document.querySelector(".toggle-password");
  
    if (!input || !icon) return;
  
    if (input.type === "password") {
      input.type = "text";
      icon.classList.remove("fa-eye");
      icon.classList.add("fa-eye-slash");
    } else {
      input.type = "password";
      icon.classList.remove("fa-eye-slash");
      icon.classList.add("fa-eye");
    }
  }
  
  </script>
</body>
</html>
