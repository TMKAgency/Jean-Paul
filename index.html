<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>TMK Agency</title>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Poppins;
}

body {
  height: 100vh;
  height: 100dvh; /* fix móvil */
  display: flex;
  background: linear-gradient(135deg, #050505, #0e0e0e);
  color: white;
  overflow: hidden;
}

/* LEFT PANEL */

.left{
width:35%;
background:rgba(15,15,15,0.9);
border-right:1px solid #1f1f1f;
padding:35px;
display:flex;
flex-direction:column;
}

.logo{
font-size:20px;
font-weight:600;
margin-bottom:30px;
color:#d4af37;
}

.user{
font-size:14px;
color:#bbb;
margin-bottom:30px;
}

.tasks{
flex:1;
overflow:auto;
}

.task{
display:flex;
align-items:center;
justify-content:space-between;
background:#1b1b1b;
padding:14px;
border-radius:8px;
margin-bottom:10px;
}

.task.completed span{
text-decoration:line-through;
color:#666;
}

.task-left{
display:flex;
gap:10px;
align-items:center;
}

.task button{
background:none;
border:none;
color:#888;
cursor:pointer;
font-size:16px;
}

.task button:hover{
color:red;
}

.add{
margin-top:15px;
display:flex;
gap:10px;
}

.add input{
flex:1;
padding:12px;
background:#1e1e1e;
border:none;
border-radius:6px;
color:white;
}

.add button{
padding:12px 18px;
background:#d4af37;
border:none;
border-radius:6px;
cursor:pointer;
}

/* RIGHT */

.right{
width:65%;
display:flex;
flex-direction:column;
}

.aiHeader{
padding:20px 30px;
background:#0f0f0f;
border-bottom:1px solid #1f1f1f;
color:#d4af37;
}

.chat{
flex:1;
padding:30px;
overflow:auto;
display:flex;
flex-direction:column;
gap:20px;
}

.message{
max-width:70%;
padding:14px 18px;
border-radius:12px;
}

.userMsg{
align-self:flex-end;
background:white;
color:black;
}

.aiMsg{
align-self:flex-start;
background:linear-gradient(135deg,#d4af37,#f3d27a);
color:black;
}

.inputArea{
display:flex;
padding:20px;
background:#0f0f0f;
gap:10px;
}

.inputArea input{
flex:1;
padding:14px;
background:#1c1c1c;
border:none;
border-radius:8px;
color:white;
}

.inputArea button{
padding:14px 24px;
background:linear-gradient(135deg,#d4af37,#f3d27a);
border:none;
border-radius:8px;
cursor:pointer;
}


.logout{
margin-bottom:20px;
}

.logout button{
width:100%;
padding:10px;
background:transparent;
border:1px solid #d4af37;
color:#d4af37;
border-radius:6px;
cursor:pointer;
transition:0.3s;
}

.logout button:hover{
background:#d4af37;
color:black;
}

.menuBtn {
    position: absolute;
    top: 20px;
    right: 20px;
    width: 30px;
    height: 22px;
    display: flex;
    flex-direction: column;
    justify-content: space-between;
    cursor: pointer;
    z-index: 1000;
}

.menuBtn span {
    display: block;
    height: 3px;
    width: 100%;
    background: #f1c40f; /* amarillo TMK */
    border-radius: 2px;
    transition: 0.3s;
}

.historyPanel {
    position: fixed;
    top: 0;
    right: -350px; /* 👈 oculto fuera de la pantalla */
    width: 350px;
    height: 100vh;
    background: #0d0d0d;
    border-left: 1px solid #222; /* 👈 cambia el lado del borde */
    transition: 0.3s;
    z-index: 2000;
    overflow-y: auto;
}

.historyPanel.active {
    right: 0; /* 👈 aparece desde la derecha */
}

.historyHeader {
    display: flex;
    justify-content: space-between;
    padding: 20px;
    font-weight: bold;
    border-bottom: 1px solid #222;
}

.historyItem {
    padding: 15px;
    border-bottom: 1px solid #1a1a1a;
    cursor: pointer;
}

.historyItem:hover {
    background: #1a1a1a;
}

.historyDate {
    font-size: 12px;
    color: #888;
}

.historyContent {
    display: flex;
    justify-content: space-between;
    align-items: center; /* 🔥 centra vertical */
    gap: 10px;
}

.deleteBtn {
    color: red;
    cursor: pointer;
    font-size: 18px;
    display: flex;
    align-items: center;
}

.historyHeader button {
    background: none;
    border: 1px solid transparent;
    color: #ffffff;
    padding: 6px 12px;
    border-radius: 6px;
    cursor: pointer;
    transition: 0.2s ease;
}

.historyHeader button:hover {
    border-color: #ffffff;
    background: rgba(0,0,0,0.05);
}

/* Agrega esto al final de todo tu CSS */

/* --- TABLET --- */
@media (max-width: 1023px) {
  .left  { width: 42%; padding: 20px; }
  .right { width: 58%; }
  .message { max-width: 85%; }
}

/* =====================
   FIX MÓVIL PRINCIPAL
===================== */

@media (max-width: 767px) {

body {
  flex-direction: column;
  overflow: hidden;
  height: 100dvh;
  width: 100vw; /* ← evita desbordamiento horizontal */
}

.right {
  width: 100vw !important; /* ← fuerza ancho exacto */
  max-width: 100vw;        /* ← evita que se salga */
  flex: 1;
  display: flex;
  flex-direction: column;
  height: 100dvh;
  overflow: hidden;
}

/* Header con alineación correcta */
.aiHeader {
  padding: 14px 16px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  position: relative;
}

/* Input area no se corta */
.inputArea {
  padding: 10px 12px;
  width: 100%;
  box-sizing: border-box; /* ← incluye padding en el ancho */
  flex-shrink: 0;
}

.inputArea input {
  font-size: 16px !important;
  min-width: 0; /* ← permite que el flex-item se encoja */
}

.inputArea button {
  flex-shrink: 0;     /* ← no se encoge ni se corta */
  white-space: nowrap;
  padding: 14px 16px;
}

/* menuBtn alineado al header */
.menuBtn {
  position: static !important;
  transform: none !important;
  width: 26px;
  height: 20px;
  flex-shrink: 0;
  margin-left: auto; /* 🔥 ESTA ES LA CLAVE */
}
}

.taskBtn {
  display: none; /* oculto en desktop y tablet */
}

@media (max-width: 767px) {
  .taskBtn {
    display: flex;
    align-items: center;
    gap: 6px;
    background: transparent;
    border: 1px solid #d4af37;
    color: #d4af37;
    padding: 6px 12px;
    border-radius: 6px;
    cursor: pointer;
    font-size: 13px;
  }

  .aiHeader {
    display: flex;
    align-items: center;
    justify-content: space-between;
  }
}

/* =====================
   OVERLAY
===================== */

.overlay {
  display: none;
  position: fixed;
  inset: 0;
  background: rgba(0, 0, 0, 0.65);
  z-index: 2500;
}

.overlay.active {
  display: block;
}

   RESPONSIVE — TABLET
===================== */

  .left {
    width: 42%;
    padding: 20px;
  }

  .right {
    width: 58%;
  }

  .message {
    max-width: 85%;
  }
}

/* =====================
   RESPONSIVE — MÓVIL
===================== */

@media (max-width: 767px) {

  body {
    flex-direction: column;
    overflow: hidden;
    height: 100dvh;
  }

  .left {
    position: fixed !important;
    top: 0;
    left: -100% !important;
    width: 82% !important;
    max-width: 300px;
    height: 100%;
    z-index: 3000;
    transition: left 0.3s ease;
    overflow-y: auto;
    padding: 20px 16px;
    border-right: 1px solid #2a2a2a;
  }

  .left.open {
    left: 0 !important;
  }

  .closePanelBtn {
    display: flex;
    align-items: center;
    gap: 6px;
    align-self: flex-end;
    background: transparent;
    border: 1px solid #555;
    color: #aaa;
    padding: 7px 14px;
    border-radius: 6px;
    font-size: 13px;
    cursor: pointer;
    margin-bottom: 16px;
  }

  .closePanelBtn:hover {
    border-color: #d4af37;
    color: #d4af37;
  }

  .right {
    width: 100% !important;
    flex: 1;
    display: flex;
    flex-direction: column;
    height: 100dvh;
  }

  .aiHeader {
    padding: 14px 16px;
  }

  .taskBtn {
    display: flex;
    align-items: center;
    gap: 6px;
    background: transparent;
    border: 1px solid #d4af37;
    color: #d4af37;
    padding: 6px 12px;
    border-radius: 6px;
    cursor: pointer;
    font-size: 13px;
    margin-right: 57px;
  }

  .message {
    max-width: 90%;
  }

  .chat {
    padding: 14px;
  }

  .inputArea {
    padding: 10px 12px;
  }

  .inputArea input,
  .add input {

  }
}

/* =====================
   PANTALLAS MUY PEQUEÑAS
===================== */

@media (max-width: 360px) {
  .logo {
    font-size: 17px;
  }

  .inputArea button {
    padding: 14px 12px;
    font-size: 13px;
  }
}

/* =====================
   BOTÓN CERRAR PANEL (DEFAULT)
===================== */

.closePanelBtn {
  display: none;
}

@media (max-width: 767px) {

.closePanelBtn {
  display: flex;
  align-items: center;
  gap: 6px;
  align-self: flex-end;
  background: transparent;
  border: 1px solid #555;
  color: #aaa;

  border-radius: 6px;

  cursor: pointer;

}

}

@media (max-width: 767px) {
  .menuBtn {
    top: 7% !important;
    transform: translateY(-50%);
  }
}
</style>
</head>

<body>    

<div class="overlay" id="overlay" onclick="closePanel()"></div>


<div class="left">

<button class="closePanelBtn" onclick="closePanel()">✕ Cerrar</button>


<div class="logo">TMK Agency</div>

<div class="user" id="userEmail"></div>

<!-- 👇 AQUÍ -->
<div class="logout">
<button onclick="logout()">Cerrar sesión</button>
<br>
<button id="exportBtn" onclick="exportTasks()" style="margin-top: 20px;" >
  📊 Exportar tareas del mes
</button>

<button style="margin-top: 20px;" 
  id="assignedTasksBtn" 
  onclick="openAssignedTasksPopup()">
  👥 Ver tareas asignadas
</button>

</div>

<h3>Tareas</h3>

<div class="tasks" id="tasks"></div>

<div class="add">
<input id="taskInput" placeholder="Nueva tarea">
<button onclick="addTask()">Agregar</button>
</div>

</div>

<div class="right">

  <div class="aiHeader">

      <button class="taskBtn" onclick="openPanel()">☑ Tareas</button>

      <div class="title">Jean Paul — IA</div>

      <div class="menuBtn" onclick="toggleMenu()">
          <span></span>
          <span></span>
          <span></span>
      </div>

  </div>

  <div class="chat" id="chat"></div>

  <div class="inputArea">
      <input id="message" placeholder="Habla con Jean Paul...">
      <button onclick="send()">Enviar</button>
  </div>

</div>
<div id="historyPanel" class="historyPanel">

    <div class="historyHeader">
        <span>Historial</span>
        <button onclick="closeMenu()">✕</button>
    </div>

    <div id="historyList"></div>

</div>
<script>
  const API = "https://jean-paul.onrender.com"
 
 const SUPERVISORS = [
     "marcolamugue@tmk-agency.com",
     "danielaalvarez@tmk-agency.com",
     "fabricio@tmk-agency.com"
 ]
 
 let userEmail = null
 
 window.onload = async () => {
     userEmail = localStorage.getItem("email")
 
     if(!userEmail){
         alert("Debes iniciar sesión")
         window.location = "login.html"
         return
     }
 
     document.getElementById("userEmail").innerText = "Usuario: " + userEmail
 
     // Mostrar botón solo a supervisores
     if(SUPERVISORS.includes(userEmail)){
         document.getElementById("assignedTasksBtn").style.display = "block"
     }
 
     loadTasks()
     checkEndOfMonth()
 
     try{
         if(!sessionStorage.getItem("welcomeShown")){
             const res = await fetch(API + "/welcome", {
                 method:"POST",
                 headers:{'Content-Type':'application/json'},
                 body:JSON.stringify({ email: userEmail })
             })
             const data = await res.json()
             addMessage(data.message, "aiMsg")
             sessionStorage.setItem("welcomeShown", "true")
         }
     }catch(err){
         console.error("Error welcome:", err)
     }
 }
 
 // ======================
 // FIN DE MES: ALERTA + BOTÓN
 // ======================
 
 function checkEndOfMonth() {
     const today = new Date()
     const lastDay = new Date(today.getFullYear(), today.getMonth() + 1, 0).getDate()
 
     if(today.getDate() === lastDay) {
         document.getElementById("exportBtn").style.display = "block"
 
         if(!sessionStorage.getItem("endOfMonthAlertShown")){
             setTimeout(() => {
                 addMessage("⚠️ Hoy es el último día del mes. Podés exportar el resumen de tareas del mes con el botón 'Exportar tareas del mes' en el panel izquierdo.", "aiMsg")
                 sessionStorage.setItem("endOfMonthAlertShown", "true")
             }, 1500)
         }
     }
 }
 
 // ======================
 // EXPORTAR EXCEL
 // ======================
 
 async function exportTasks() {
     try {
         const res = await fetch(API + "/get-tasks", {
             method: "POST",
             headers: {'Content-Type': 'application/json'},
             body: JSON.stringify({ email: userEmail })
         })
 
         const data = await res.json()
 
         if(!data.tasks || data.tasks.length === 0){
             alert("No tenés tareas para exportar.")
             return
         }
 
         const now = new Date()
         const month = now.toLocaleString('es-CR', { month: 'long' })
         const year = now.getFullYear()
 
         let csv = `Reporte de Tareas — ${month} ${year}\n`
         csv += `Usuario,${userEmail}\n\n`
         csv += `N°,Tarea,Estado\n`
 
         data.tasks.forEach((t, i) => {
             const estado = t.completed ? "Completada" : "Pendiente"
             csv += `${i + 1},"${t.task.replace(/"/g, '""')}",${estado}\n`
         })
 
         const completadas = data.tasks.filter(t => t.completed).length
         const pendientes = data.tasks.filter(t => !t.completed).length
 
         csv += `\nTotal tareas,${data.tasks.length}`
         csv += `\nCompletadas,${completadas}`
         csv += `\nPendientes,${pendientes}`
 
         const blob = new Blob(["\uFEFF" + csv], { type: "text/csv;charset=utf-8;" })
         const url = URL.createObjectURL(blob)
         const a = document.createElement("a")
         a.href = url
         a.download = `tareas_${month}_${year}_${userEmail.split("@")[0]}.csv`
         a.click()
         URL.revokeObjectURL(url)
 
         addMessage(`✅ Archivo exportado: tareas de ${month} ${year}.`, "aiMsg")
 
     } catch(err) {
         console.error(err)
         alert("Error exportando tareas")
     }
 }
 
 // ======================
 // POPUP TAREAS ASIGNADAS
 // ======================
 
 async function openAssignedTasksPopup() {
     document.getElementById("assignedPopupOverlay").style.display = "flex"
     document.getElementById("assignedTasksList").innerHTML = "<p style='color:#888;text-align:center;padding:20px;'>Cargando...</p>"
 
     try {
         const res = await fetch(API + "/get-assigned-tasks", {
             method: "POST",
             headers: {'Content-Type': 'application/json'},
             body: JSON.stringify({ email: userEmail })
         })
 
         const data = await res.json()
 
         const list = document.getElementById("assignedTasksList")
         list.innerHTML = ""
 
         if(!data.tasks || data.tasks.length === 0){
             list.innerHTML = "<p style='color:#888;text-align:center;padding:20px;'>No has asignado tareas aún.</p>"
             return
         }
 
         // Agrupar por usuario
         const grouped = {}
         data.tasks.forEach(t => {
             if(!grouped[t.assigned_to]) grouped[t.assigned_to] = []
             grouped[t.assigned_to].push(t)
         })
 
         Object.entries(grouped).forEach(([email, tasks]) => {
             const userName = email.split("@")[0]
             const completadas = tasks.filter(t => t.completed).length
             const total = tasks.length
 
             const section = document.createElement("div")
             section.style.cssText = "margin-bottom:20px;"
 
             section.innerHTML = `
                 <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:10px;padding-bottom:8px;border-bottom:1px solid #2a2a2a;">
                     <span style="font-weight:600;color:#d4af37;font-size:15px;">👤 ${userName}</span>
                     <span style="font-size:12px;color:#888;">${completadas}/${total} completadas</span>
                 </div>
             `
 
             tasks.forEach(t => {
                 const item = document.createElement("div")
                 item.style.cssText = `
                     display:flex;
                     align-items:center;
                     gap:10px;
                     padding:10px 12px;
                     border-radius:8px;
                     margin-bottom:8px;
                     background:${t.completed ? '#1a2a1a' : '#1e1e1e'};
                     border-left:3px solid ${t.completed ? '#4caf50' : '#d4af37'};
                 `
 
                 item.innerHTML = `
                     <span style="font-size:16px;">${t.completed ? '✅' : '⏳'}</span>
                     <div style="flex:1;">
                         <div style="font-size:13px;color:${t.completed ? '#888' : '#fff'};${t.completed ? 'text-decoration:line-through;' : ''}">${t.task}</div>
                         <div style="font-size:11px;color:#555;margin-top:2px;">${t.date}</div>
                     </div>
                     <span style="font-size:11px;padding:3px 8px;border-radius:12px;background:${t.completed ? '#1f3a1f' : '#2a2200'};color:${t.completed ? '#4caf50' : '#d4af37'};">
                         ${t.completed ? 'Completada' : 'Pendiente'}
                     </span>
                 `
                 section.appendChild(item)
             })
 
             list.appendChild(section)
         })
 
     } catch(err) {
         console.error(err)
         document.getElementById("assignedTasksList").innerHTML = "<p style='color:red;text-align:center;padding:20px;'>Error cargando tareas.</p>"
     }
 }
 
 function closeAssignedTasksPopup() {
     document.getElementById("assignedPopupOverlay").style.display = "none"
 }
 
 // Cerrar popup al hacer click fuera
 document.addEventListener("click", function(e) {
     const overlay = document.getElementById("assignedPopupOverlay")
     if(e.target === overlay) closeAssignedTasksPopup()
 })
 
 // ======================
 // CHAT IA
 // ======================
 
 async function send(){
     const input = document.getElementById("message")
     const msg = input.value.trim()
 
     if(!msg) return
 
     addMessage(msg, "userMsg")
     input.value = ""
 
     try{
         const res = await fetch(API+"/ai",{
             method:"POST",
             headers:{'Content-Type':'application/json'},
             body:JSON.stringify({ message:msg, email:userEmail })
         })
 
         const data = await res.json()
         addMessage(data.response || "Error en respuesta", "aiMsg")
         loadTasks()
 
     }catch(err){
         console.error(err)
         addMessage("Error conectando con el servidor", "aiMsg")
     }
 }
 
 function addMessage(text, type){
     const chat = document.getElementById("chat")
     const div = document.createElement("div")
     div.className = "message " + type
     div.innerText = text
     chat.appendChild(div)
     chat.scrollTop = chat.scrollHeight
 }
 
 // ======================
 // TASKS
 // ======================
 
 async function loadTasks(){
     try{
         const res = await fetch(API+"/get-tasks",{
             method:"POST",
             headers:{'Content-Type':'application/json'},
             body:JSON.stringify({email:userEmail})
         })
 
         const data = await res.json()
         const container = document.getElementById("tasks")
         container.innerHTML = ""
 
         data.tasks.forEach(t => {
             const div = document.createElement("div")
             div.className = "task" + (t.completed ? " completed" : "")
             div.innerHTML = `
             <div class="task-left">
                 <input type="checkbox" ${t.completed ? "checked":""} onclick="complete(${t.id})">
                 <span>${t.task}</span>
             </div>
             <button onclick="removeTask(${t.id})">🗑</button>
             `
             container.appendChild(div)
         })
 
     }catch(err){
         console.error("Error cargando tareas:", err)
     }
 }
 
 async function addTask(){
     const input = document.getElementById("taskInput")
     const text = input.value.trim()
 
     if(!text){ alert("Escribe una tarea"); return }
 
     try{
         const res = await fetch(API+"/add-task",{
             method:"POST",
             headers:{'Content-Type':'application/json'},
             body:JSON.stringify({ email: userEmail, task: text })
         })
 
         const data = await res.json()
 
         if(data.message !== "Tarea creada"){ alert("Error: " + data.message); return }
 
         input.value = ""
         loadTasks()
 
     }catch(err){
         console.error(err)
         alert("Error agregando tarea")
     }
 }
 
 async function complete(id){
     try{
         await fetch(API+"/complete-task",{
             method:"POST",
             headers:{'Content-Type':'application/json'},
             body:JSON.stringify({ task_id: id, email: userEmail })
         })
         loadTasks()
     }catch(err){
         console.error(err)
     }
 }
 
 async function removeTask(id){
     try{
         await fetch(API+"/delete-task",{
             method:"POST",
             headers:{'Content-Type':'application/json'},
             body:JSON.stringify({ task_id: id, email: userEmail })
         })
         loadTasks()
     }catch(err){
         console.error(err)
     }
 }
 
 function logout(){
     localStorage.removeItem("email")
     window.location = "login.html"
 }
 
 document.addEventListener("DOMContentLoaded", () => {
     const input = document.getElementById("message")
     if(input){
         input.addEventListener("keydown", function(event) {
             if (event.key === "Enter") { event.preventDefault(); send() }
         })
     }
 })
 
 // History panel
 function toggleMenu() {
     document.getElementById("historyPanel").classList.toggle("active")
     if(document.getElementById("historyPanel").classList.contains("active")) loadHistory()
 }
 
 function closeMenu() {
     document.getElementById("historyPanel").classList.remove("active")
 }
 
 async function loadHistory() {
     try {
         const res = await fetch(API + "/get-history", {
             method: "POST",
             headers: {'Content-Type': 'application/json'},
             body: JSON.stringify({ email: userEmail })
         })
         const data = await res.json()
         const list = document.getElementById("historyList")
         list.innerHTML = ""
 
         data.history.forEach(h => {
             const item = document.createElement("div")
             item.className = "historyItem"
             item.innerHTML = `
                 <div class="historyContent">
                     <div onclick="loadConversation(${h.id}, '${h.message.replace(/'/g,"\\'")}', '${h.response ? h.response.replace(/'/g,"\\'") : ""}')">
                         <div class="historyDate">${h.date}</div>
                         <div>${h.message.substring(0,50)}...</div>
                     </div>
                     <span class="deleteBtn" onclick="deleteHistory(${h.id})">🗑</span>
                 </div>
             `
             list.appendChild(item)
         })
     } catch(err) {
         console.error(err)
     }
 }
 
 function loadConversation(id, msg, res) {
     addMessage(msg, "userMsg")
     if(res) addMessage(res, "aiMsg")
     closeMenu()
 }
 
 async function deleteHistory(id) {
     try {
         await fetch(API + "/delete-history", {
             method: "POST",
             headers: {'Content-Type': 'application/json'},
             body: JSON.stringify({ id: id, email: userEmail })
         })
         loadHistory()
     } catch(err) {
         console.error(err)
     }
 }
 
 function openPanel() {
     document.querySelector(".left").classList.add("open")
     document.getElementById("overlay").classList.add("active")
 }
 
 function closePanel() {
     document.querySelector(".left").classList.remove("open")
     document.getElementById("overlay").classList.remove("active")
 }
 </script>
