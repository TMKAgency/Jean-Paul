<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>TMK Agency</title>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Poppins;
}

body{
min-height:100vh;
display:flex;
background:linear-gradient(135deg,#050505,#0e0e0e);
color:white;
overflow:hidden;
}

/* =========================
   LAYOUT BASE (DESKTOP)
========================= */

.left{
width:320px;
min-width:260px;
background:rgba(15,15,15,0.95);
border-right:1px solid #1f1f1f;
padding:25px;
display:flex;
flex-direction:column;
transition:0.3s;
}

.right{
flex:1;
display:flex;
flex-direction:column;
}

/* =========================
   ELEMENTOS
========================= */

.logo{
font-size:20px;
font-weight:600;
margin-bottom:25px;
color:#d4af37;
}

.user{
font-size:14px;
color:#bbb;
margin-bottom:20px;
}

.tasks{
flex:1;
overflow:auto;
}

.task{
display:flex;
align-items:center;
justify-content:space-between;
background:#1b1b1b;
padding:12px;
border-radius:8px;
margin-bottom:10px;
}

.task.completed span{
text-decoration:line-through;
color:#666;
}

.task-left{
display:flex;
gap:10px;
align-items:center;
}

.task button{
background:none;
border:none;
color:#888;
cursor:pointer;
}

.task button:hover{
color:red;
}

.add{
margin-top:10px;
display:flex;
gap:10px;
}

.add input{
flex:1;
padding:10px;
background:#1e1e1e;
border:none;
border-radius:6px;
color:white;
}

.add button{
padding:10px 15px;
background:#d4af37;
border:none;
border-radius:6px;
cursor:pointer;
}

/* =========================
   CHAT
========================= */

.aiHeader{
padding:15px 20px;
background:#0f0f0f;
border-bottom:1px solid #1f1f1f;
color:#d4af37;
}

.chat{
flex:1;
padding:20px;
overflow:auto;
display:flex;
flex-direction:column;
gap:15px;
}

.message{
max-width:75%;
padding:12px 16px;
border-radius:12px;
font-size:14px;
}

.userMsg{
align-self:flex-end;
background:white;
color:black;
}

.aiMsg{
align-self:flex-start;
background:linear-gradient(135deg,#d4af37,#f3d27a);
color:black;
}

.inputArea{
display:flex;
padding:15px;
background:#0f0f0f;
gap:10px;
}

.inputArea input{
flex:1;
padding:12px;
background:#1c1c1c;
border:none;
border-radius:8px;
color:white;
}

.inputArea button{
padding:12px 18px;
background:linear-gradient(135deg,#d4af37,#f3d27a);
border:none;
border-radius:8px;
cursor:pointer;
}

/* =========================
   LOGOUT
========================= */

.logout{
margin-bottom:15px;
}

.logout button{
width:100%;
padding:10px;
background:transparent;
border:1px solid #d4af37;
color:#d4af37;
border-radius:6px;
cursor:pointer;
transition:0.3s;
}

.logout button:hover{
background:#d4af37;
color:black;
}

/* =========================
   MENU (HAMBURGUESA)
========================= */

.menuBtn {
position: fixed;
top: 15px;
right: 15px; /* 🔥 SIEMPRE DERECHA */
width: 28px;
height: 20px;
display: none;
flex-direction: column;
justify-content: space-between;
cursor: pointer;
z-index: 3000;
}

.menuBtn span {
display:block;
height: 3px;
width: 100%;
background: #f1c40f;
border-radius: 2px;
}

/* =========================
   HISTORY PANEL
========================= */

.historyPanel {
position: fixed;
top: 0;
right: -100%;
width: 300px;
height: 100%;
background: #0d0d0d;
border-left: 1px solid #222;
transition: 0.3s;
z-index: 2500;
overflow-y: auto;
}

.historyPanel.active {
right: 0;
}

.historyHeader {
display: flex;
justify-content: space-between;
padding: 15px;
font-weight: bold;
border-bottom: 1px solid #222;
}

.historyItem {
padding: 12px;
border-bottom: 1px solid #1a1a1a;
cursor: pointer;
}

.historyItem:hover {
background: #1a1a1a;
}

.deleteBtn {
color: red;
cursor: pointer;
}

/* =========================
   📱 MOBILE (<=768px)
========================= */

@media (max-width: 768px){

body{
flex-direction:column;
overflow:auto;
}

/* Sidebar oculto */
.left{
position: fixed;
top: 0;
left: -100%;
height: 100%;
z-index: 2000;
width: 260px;
}

/* Activar sidebar */
.left.active{
left: 0;
}

/* 🔥 BOTÓN SIEMPRE A LA DERECHA */
.menuBtn{
display:flex;
position: fixed;
top: 15px;
right: 15px !important;
left: auto !important;
}

/* Chat ocupa todo */
.right{
width:100%;
height:100vh;
}

.chat{
padding:15px;
}

.message{
max-width:90%;
font-size:13px;
}

.inputArea{
padding:10px;
}

}

/* =========================
   📲 TABLET (769px - 1024px)
========================= */

@media (max-width: 1024px){

.left{
width:260px;
}

.message{
max-width:85%;
}

}
</style>
</head>

<body>

<div class="left">

<div class="logo">TMK Agency</div>

<div class="user" id="userEmail"></div>

<!-- 👇 AQUÍ -->
<div class="logout">
<button onclick="logout()">Cerrar sesión</button>
</div>

<h3>Tareas</h3>

<div class="tasks" id="tasks"></div>

<div class="add">
<input id="taskInput" placeholder="Nueva tarea">
<button onclick="addTask()">Agregar</button>
</div>

</div>

<div class="right">

    <!-- BOTÓN MENU -->
    <div class="menuBtn" onclick="toggleMenu()">
        <span></span>
        <span></span>
        <span></span>
    </div>

    <div class="aiHeader">Jean Paul — IA</div>

    <div class="chat" id="chat"></div>

    <div class="inputArea">
        <input id="message" placeholder="Habla con Jean Paul...">
        <button onclick="send()">Enviar</button>
    </div>

</div>
<div id="historyPanel" class="historyPanel">

    <div class="historyHeader">
        <span>Historial</span>
        <button onclick="closeMenu()">✕</button>
    </div>

    <div id="historyList"></div>

</div>
<script>
    function toggleMenu(){

const panel = document.getElementById("historyPanel")
panel.classList.toggle("active")

if(panel.classList.contains("active")){
    loadHistory()
}
}

function closeMenu(){
document.getElementById("historyPanel").classList.remove("active")
}

async function loadHistory(){

try{

    const res = await fetch(API+"/get-history",{
        method:"POST",
        headers:{'Content-Type':'application/json'},
        body:JSON.stringify({email:userEmail})
    })

    const data = await res.json()

    const container = document.getElementById("historyList")
    container.innerHTML = ""

    data.history.forEach(item => {

        const div = document.createElement("div")
        div.className = "historyItem"

        div.innerHTML = `
    <div class="historyContent">
        <div>
            <div>${item.message}</div>
            <div class="historyDate">${item.date}</div>
        </div>
        <span class="deleteBtn" onclick="deleteHistory(event, ${item.id})">🗑</span>
    </div>
`

        div.onclick = () => {
            loadConversation(item)
        }

        container.appendChild(div)
    })

}catch(err){
    console.error(err)
}
}

async function deleteHistory(event, id){

event.stopPropagation() // 🔥 CLAVE

await fetch(API+"/delete-history",{
    method:"POST",
    headers:{'Content-Type':'application/json'},
    body:JSON.stringify({
        id:id,
        email:userEmail
    })
})

loadHistory()
}

function loadConversation(item){

const chat = document.getElementById("chat")
chat.innerHTML = ""

addMessage(item.message, "userMsg")
addMessage(item.response, "aiMsg")

closeMenu()
}
</script>
<script>

    const API = "https://jean-paul.onrender.com"
    
    let userEmail = null
    
    // ======================
    // INIT SEGURO
    // ======================
    
    window.onload = () => {
    
        userEmail = localStorage.getItem("email")
    
        if(!userEmail){
            alert("Debes iniciar sesión")
            window.location = "login.html"
            return
        }
    
        document.getElementById("userEmail").innerText = "Usuario: " + userEmail
    
        loadTasks()
    }
    
    // ======================
    // CHAT IA
    // ======================
    
    async function send(){
    
        const input = document.getElementById("message")
        const msg = input.value.trim()
    
        if(!msg) return
    
        addMessage(msg, "userMsg")
        input.value = ""
    
        try{
    
            const res = await fetch(API+"/ai",{
                method:"POST",
                headers:{'Content-Type':'application/json'},
                body:JSON.stringify({
                    message:msg,
                    email:userEmail
                })
            })
    
            const data = await res.json()
    
            console.log("AI response:", data)
    
            addMessage(data.response || "Error en respuesta", "aiMsg")
    
            loadTasks()
    
        }catch(err){
            console.error(err)
            addMessage("Error conectando con el servidor", "aiMsg")
        }
    
    }
    
    // ======================
    // UI CHAT
    // ======================
    
    function addMessage(text, type){
    
        const chat = document.getElementById("chat")
    
        const div = document.createElement("div")
        div.className = "message " + type
        div.innerText = text
    
        chat.appendChild(div)
    
        chat.scrollTop = chat.scrollHeight
    }
    
    // ======================
    // TASKS
    // ======================
    
    async function loadTasks(){
    
        try{
    
            const res = await fetch(API+"/get-tasks",{
                method:"POST",
                headers:{'Content-Type':'application/json'},
                body:JSON.stringify({email:userEmail})
            })
    
            const data = await res.json()
    
            console.log("Tasks:", data)
    
            const container = document.getElementById("tasks")
            container.innerHTML = ""
    
            data.tasks.forEach(t => {
    
                const div = document.createElement("div")
                div.className = "task" + (t.completed ? " completed" : "")
    
                div.innerHTML = `
                <div class="task-left">
                    <input type="checkbox" ${t.completed ? "checked":""} onclick="complete(${t.id})">
                    <span>${t.task}</span>
                </div>
                <button onclick="removeTask(${t.id})">🗑</button>
                `
    
                container.appendChild(div)
            })
    
        }catch(err){
            console.error("Error cargando tareas:", err)
        }
    
    }
    
    // ======================
    // AGREGAR TAREA (FIX REAL)
    // ======================
    
    async function addTask(){
    
        const input = document.getElementById("taskInput")
        const text = input.value.trim()
    
        if(!text){
            alert("Escribe una tarea")
            return
        }
    
        try{
    
            const res = await fetch(API+"/add-task",{
                method:"POST",
                headers:{'Content-Type':'application/json'},
                body:JSON.stringify({
                    email: userEmail,
                    task: text
                })
            })
    
            const data = await res.json()
    
            console.log("Add task:", data)
    
            if(data.message !== "Tarea creada"){
                alert("Error: " + data.message)
                return
            }
    
            input.value = ""
    
            loadTasks()
    
        }catch(err){
            console.error(err)
            alert("Error agregando tarea")
        }
    
    }
    
    // ======================
    // COMPLETAR
    // ======================
    
    async function complete(id){
    
        try{
    
            await fetch(API+"/complete-task",{
                method:"POST",
                headers:{'Content-Type':'application/json'},
                body:JSON.stringify({
                    task_id: id,
                    email: userEmail
                })
            })
    
            loadTasks()
    
        }catch(err){
            console.error(err)
            alert("Error al completar tarea")
        }
    
    }
    
    // ======================
    // ELIMINAR
    // ======================
    
    async function removeTask(id){
    
        try{
    
            await fetch(API+"/delete-task",{
                method:"POST",
                headers:{'Content-Type':'application/json'},
                body:JSON.stringify({
                    task_id: id,
                    email: userEmail
                })
            })
    
            loadTasks()
    
        }catch(err){
            console.error(err)
            alert("Error eliminando tarea")
        }
    
    }
    
    // ======================
    // LOGOUT
    // ======================
    
    function logout(){
        localStorage.removeItem("email")
        window.location = "login.html"
    }
    
    // ======================
    // ENTER PARA ENVIAR CHAT
    // ======================
    
    document.addEventListener("DOMContentLoaded", () => {
        const input = document.getElementById("message")
    
        if(input){
            input.addEventListener("keydown", function(event) {
                if (event.key === "Enter") {
                    event.preventDefault()
                    send()
                }
            })
        }
    })
    
    </script>
</body>
</html>
